<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Practice Test 26</title>
    <style>
        :root { --primary: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .test-container { max-width: 1000px; margin: auto; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        h2 { color: var(--primary); font-weight: 800; border-bottom: 2px solid rgba(16,185,129,0.2); padding-bottom: 10px; margin-bottom: 30px; }
        .passage { margin-bottom: 50px; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; }
        .passage-title { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; }
        .passage-content { font-size: 1.05rem; text-align: justify; }
        .questions { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        input[type="text"] { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 15px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>Reading Practice Test 26</h2>
        <div class="passage">
            <div class="passage-title">PASSAGE 1: Ancient Civilizations</div>
            <div class="passage-content"><p>The study of ancient civilizations reveals much about the development of human society and culture...</p></div>
            <div class="questions"><p><strong>Questions 1-13</strong></p><p>1. <input type="text" id="rq1"></p></div>
        </div>
    </div>
</body>
</html>
